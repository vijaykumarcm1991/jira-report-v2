version: "3.9"

services:
  api:
    build: .
    container_name: jira_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Kolkata
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: jira_db
    restart: always
    environment:
      POSTGRES_USER: jira_user
      POSTGRES_PASSWORD: jira_pass
      POSTGRES_DB: jira_reports
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jira_user"]
      interval: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: