<!DOCTYPE html>

<html>
<head>
    <title>Jira Report Builder</title>
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<style>
    body {
        font-family: Arial;
        background: #f5f6fa;
        margin: 0;
    }

    .container {
        width: 1000px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
    }

    select[multiple] {
        height: 150px;
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 20px;
    }

    .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 25px;
        margin-top: 10px;
        margin-bottom: 20px;
    }

    .grid-3 input {
        width: 95%;
    }

    label {
        margin-top: 10px;
    }

    select[multiple] {
        height: 180px;
    }

    .full-width {
        grid-column: span 2;
    }

    button {
        padding: 10px 15px;
        border: none;
        background: #4CAF50;
        color: white;
        cursor: pointer;
        border-radius: 5px;
        margin-top: 10px;
    }

    button:hover {
        background: #45a049;
    }

    .report-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f1f2f6;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
    }

    .actions button {
        margin-left: 5px;
        background: #3498db;
    }

    .actions button:hover {
        background: #2980b9;
    }

    .preview-box {
        background: #ecf0f1;
        padding: 15px;
        margin-top: 15px;
        border-radius: 5px;
        font-size: 14px;
    }

    .history-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    .history-table th {
        background: #2f3640;
        color: white;
        padding: 10px;
        text-align: left;
    }

    .history-table td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }

    .history-table tr:hover {
        background: #f1f2f6;
    }

    .status-success {
        color: green;
        font-weight: bold;
    }

    .status-failed {
        color: red;
        font-weight: bold;
    }

    .status-running {
        color: orange;
        font-weight: bold;
    }

    .download-btn {
        background: #27ae60;
        padding: 5px 10px;
        color: white;
        border-radius: 4px;
        text-decoration: none;
    }

    .download-btn:hover {
        background: #219150;
    }

</style>


</head>

<body>

<div class="container">


<h2>Create Report</h2>

<label>Report Name</label>
<input type="text" id="name" placeholder="Enter report name">

<div class="grid">
    <div>
        <label>Project</label>
        <select id="projects" multiple></select>
    </div>

    <div>
        <label>Status</label>
        <select id="statuses" multiple></select>
    </div>

    <div>
        <label>Issue Types</label>
        <select id="issuetypes" multiple></select>
    </div>

    <div class="full-width">
        <label>Fields</label>
        <select id="fields" multiple></select>
    </div>
</div>

<div class="grid-3">
    <div>
        <label>Start Date</label>
        <input type="date" id="start_date">
    </div>

    <div>
        <label>End Date</label>
        <input type="date" id="end_date">
    </div>

    <div>
        <label>Last N Days</label>
        <input type="number" id="range_days" placeholder="e.g. 3">
    </div>

    <label>Email (for scheduled reports)</label>
    <input type="email" id="email" placeholder="Enter email">

    <label>Schedule</label>
    <select id="schedule_type">
        <option value="">-- Select --</option>
        <option value="none">No Schedule</option>
        <option value="one_time">One Time</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
    </select>

    <div id="schedule_options"></div>

</div>

<button id="submitBtn" onclick="createReport()">Create Report</button>

<hr>

<h2>Reports</h2>

<div id="reportList"></div>

<div id="progressContainer" style="display:none; margin-top:20px;">
    <div style="background:#ddd; width:100%; height:20px; border-radius:5px;">
        <div id="progressBar" style="background:green; height:20px; width:0%; border-radius:5px;"></div>
    </div>
    <p id="progressText" style="margin-top:5px;"></p>
</div>

<div id="previewBox" class="preview-box" style="display:none;"></div>

<h3 style="margin-top:30px;">📊 Report History</h3>
<table class="history-table">
    <thead>
        <tr>
            <th>ID</th>
            <th>Report ID</th>
            <th>Status</th>
            <th>Total Records</th>
            <th>Created</th>
            <th>Download</th>
        </tr>
    </thead>
    <tbody id="historyTable"></tbody>
</table>

</div>

<script>

let editingReportId = null;

function generateJobId() {
    return 'job-' + Date.now() + '-' + Math.floor(Math.random() * 100000);
}

async function loadMetadata() {
    const fields = await fetch("/jira/fields").then(r => r.json());
    const projects = await fetch("/jira/projects").then(r => r.json());
    const statuses = await fetch("/jira/statuses").then(r => r.json());
    const issuetypes = await fetch("/jira/issuetypes").then(r => r.json());

    fields.forEach(f => {
        let opt = document.createElement("option");
        opt.value = f.id;
        opt.text = f.name;
        document.getElementById("fields").appendChild(opt);
    });

    projects.forEach(p => {
        let opt = document.createElement("option");
        opt.value = p.key;
        opt.text = p.name;
        document.getElementById("projects").appendChild(opt);
    });

    statuses.forEach(s => {
        let opt = document.createElement("option");
        opt.value = s.name;
        opt.text = s.name;
        document.getElementById("statuses").appendChild(opt);
    });

    const typeSelect = document.getElementById("issuetypes");
    typeSelect.innerHTML = "";

    issuetypes.forEach(i => {
        const opt = document.createElement("option");
        opt.value = i.name;
        opt.textContent = i.name;
        typeSelect.appendChild(opt);
    });

    return true;
}

function getSelectedValues(id) {
    return Array.from(document.getElementById(id).selectedOptions)
        .map(o => o.value);
}

async function createReport() {

    if (getSelectedValues("projects").length === 0) {
        alert("Please select at least one project");
        return;
    }

    let cron = null;

    const type = document.getElementById("schedule_type").value;

    function getHourMinute(timeStr) {
        const [hour, minute] = timeStr.split(":");
        return { hour: parseInt(hour), minute: parseInt(minute) };
    }

    if (type === "one_time") {
        const date = document.getElementById("one_date")?.value;
        const time = document.getElementById("one_time")?.value;

        if (date && time) {
            const { hour, minute } = getHourMinute(time);
            const d = new Date(date);

            cron = JSON.stringify({
                year: d.getFullYear(),
                month: d.getMonth() + 1,
                day: d.getDate(),
                hour,
                minute
            });
        }
    }

    if (type === "daily") {
        const time = document.getElementById("daily_time")?.value;

        if (time) {
            const { hour, minute } = getHourMinute(time);
            cron = JSON.stringify({ hour, minute });
        }
    }

    if (type === "weekly") {
        const day = document.getElementById("week_day")?.value;
        const time = document.getElementById("week_time")?.value;

        if (time) {
            const { hour, minute } = getHourMinute(time);
            cron = JSON.stringify({
                day_of_week: day,
                hour,
                minute
            });
        }
    }

    if (type === "monthly") {
        const date = document.getElementById("month_date")?.value;
        const time = document.getElementById("month_time")?.value;

        if (date && time) {
            const { hour, minute } = getHourMinute(time);
            cron = JSON.stringify({
                day: parseInt(date),
                hour,
                minute
            });
        }
    }

    const data = {
        name: document.getElementById("name").value,
        project_keys: getSelectedValues("projects"),
        fields: getSelectedValues("fields"),
        statuses: getSelectedValues("statuses"),
        issuetypes: getSelectedValues("issuetypes"),
        start_date: document.getElementById("start_date").value || null,
        end_date: document.getElementById("end_date").value || null,
        range_days: document.getElementById("range_days").value || null,
        email: document.getElementById("email").value || null,
        cron: cron
    };

    if (!data.name) {
        alert("Please enter report name");
        return;
    }

    if (data.fields.length === 0) {
        alert("Please select at least one field");
        return;
    }

    if (data.range_days) {
        data.start_date = null;
        data.end_date = null;
    }

    let url = "/reports/";
    let method = "POST";

    if (editingReportId) {
        url = `/reports/${editingReportId}`;
        method = "PUT";
    }

    const res = await fetch(url, {
        method: method,
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    if (!res.ok) {
        alert("Failed to create report");
        return;
    }

    alert("Report Created Successfully");

    document.querySelector("#projects").tomselect.clear();
    document.querySelector("#statuses").tomselect.clear();
    document.querySelector("#fields").tomselect.clear();
    document.querySelector("#issuetypes").tomselect.clear();

    document.getElementById("name").value = "";
    document.getElementById("range_days").value = "";
    document.getElementById("start_date").value = "";
    document.getElementById("end_date").value = "";

    editingReportId = null;

    // Reset button text
    document.querySelector("button").innerText = "Create Report";

    loadReports();
}

async function loadReports() {
    const reports = await fetch("/reports/").then(r => r.json());

    const list = document.getElementById("reportList");
    list.innerHTML = "";

    reports.forEach(r => {
        const div = document.createElement("div");
        div.className = "report-item";

        div.innerHTML = `
            <div><b>${r.name}</b></div>
            <div class="actions">
                <button onclick="preview(${r.id})">Preview</button>
                <button onclick="download(${r.id})">Download</button>
                <button onclick="editReport(${r.id})">Edit</button>
                <button onclick="deleteReport(${r.id})">Delete</button>
            </div>
        `;

        list.appendChild(div);
    });
}

async function preview(id) {
    const res = await fetch(`/reports/${id}/preview`, { method: "POST" });
    const data = await res.json();

    const box = document.getElementById("previewBox");
    box.style.display = "block";

    box.innerHTML = `
        <b>JQL:</b><br>${data.jql}<br><br>
        <b>Total Issues:</b> ${data.total_issues}
    `;
}

async function editReport(id) {
    const reports = await fetch("/reports/").then(r => r.json());
    const report = reports.find(r => r.id === id);

    editingReportId = id;

    if (editingReportId) {
        document.getElementById("submitBtn").innerText = "Update Report";
    } else {
        document.getElementById("submitBtn").innerText = "Create Report";
    }

    const projectSelect = document.querySelector("#projects")?.tomselect;
    const statusSelect = document.querySelector("#statuses")?.tomselect;
    const fieldSelect = document.querySelector("#fields")?.tomselect;
    const issuetypeSelect = document.querySelector("#issuetypes")?.tomselect;

    if (projectSelect) projectSelect.setValue(report.project_keys || []);
    if (statusSelect) statusSelect.setValue(report.statuses || []);
    if (fieldSelect) fieldSelect.setValue(report.fields || []);
    if (issuetypeSelect) issuetypeSelect.setValue(report.issuetypes || []);

    document.getElementById("name").value = report.name;
    document.getElementById("start_date").value = report.start_date || "";
    document.getElementById("end_date").value = report.end_date || "";
    document.getElementById("range_days").value = report.range_days || "";

    alert("Edit mode enabled. Modify and click Update Report to update.");

    if (report.cron) {
        try {
            const cronObj = JSON.parse(report.cron);

            if (cronObj.year) {
                document.getElementById("schedule_type").value = "one_time";
            }
            else if (cronObj.day_of_week) {
                document.getElementById("schedule_type").value = "weekly";
            }
            else if (cronObj.day) {
                document.getElementById("schedule_type").value = "monthly";
            }
            else {
                document.getElementById("schedule_type").value = "daily";
            }

            document.getElementById("schedule_type")
                .dispatchEvent(new Event("change"));

        } catch (e) {
            console.log("Invalid cron format");
        }
    }
}

async function download(id) {

    const jobId = generateJobId();

    document.getElementById("progressContainer").style.display = "block";

    // Start report generation
    fetch(`/reports/${id}/download?job_id=${jobId}`);

    // Poll progress
    const interval = setInterval(async () => {

        const res = await fetch(`/reports/progress/${jobId}`);
        const data = await res.json();

        if (data.total > 0) {
            const percent = Math.floor((data.fetched / data.total) * 100);

            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("progressText").innerText =
                `${data.fetched}/${data.total} (${percent}%)`;

            if (data.fetched >= data.total) {
                clearInterval(interval);

                // Download file after completion
                window.open(`/reports/${id}/download`, "_blank");
            }
        }

    }, 1000);
}

async function deleteReport(id) {
    if (!confirm("Are you sure you want to delete this report?")) return;

    await fetch(`/reports/${id}`, {
        method: "DELETE"
    });

    alert("Report deleted");
    loadReports();
}

function initDropdowns() {

    new TomSelect("#projects", {
        plugins: ['remove_button'],
        create: false,
        maxItems: null,   // allows multi select
        placeholder: "Select projects...",
        persist: false
    });

    new TomSelect("#statuses", {
        plugins: ['remove_button'],
        create: false,
        placeholder: "Select status..."
    });

    new TomSelect("#fields", {
        plugins: ['remove_button'],
        create: false,
        maxOptions: 10000,
        placeholder: "Search and select fields..."
    });

    new TomSelect("#issuetypes", {
        plugins: ['remove_button'],
        create: false,
        placeholder: "Select issue types..."
    });
}

async function loadHistory() {
    const res = await fetch("/reports/history");
    const data = await res.json();

    const table = document.getElementById("historyTable");
    table.innerHTML = "";

    data.forEach(h => {

        const statusClass =
            h.status === "Success" ? "status-success" :
            h.status === "Failed" ? "status-failed" :
            "status-running";

        table.innerHTML += `
        <tr>
            <td>${h.id}</td>
            <td>${h.report_id}</td>
            <td class="${statusClass}">${h.status}</td>
            <td>${h.total_records || "-"}</td>
            <td>${new Date(h.created_at).toLocaleString()}</td>
            <td>
                ${h.file_path ? `<a class="download-btn" href="/reports/history/${h.id}/download">Download</a>` : "-"}
            </td>
        </tr>
        `;
    });
}

async function initApp() {
    await loadMetadata();
    initDropdowns();
    loadReports();
    loadHistory();
}

document.getElementById("schedule_type").addEventListener("change", function () {

    const type = this.value;
    const container = document.getElementById("schedule_options");

    container.innerHTML = "";

    if (type === "one_time") {
        container.innerHTML = `
            <label>Date</label>
            <input type="date" id="one_date">

            <label>Time</label>
            <input type="time" id="one_time">
        `;
    }

    if (type === "daily") {
        container.innerHTML = `
            <label>Time</label>
            <input type="time" id="daily_time">
        `;
    }

    if (type === "weekly") {
        container.innerHTML = `
            <label>Day</label>
            <select id="week_day">
                <option value="mon">Monday</option>
                <option value="tue">Tuesday</option>
                <option value="wed">Wednesday</option>
                <option value="thu">Thursday</option>
                <option value="fri">Friday</option>
                <option value="sat">Saturday</option>
                <option value="sun">Sunday</option>
            </select>

            <label>Time</label>
            <input type="time" id="week_time">
        `;
    }

    if (type === "monthly") {
        container.innerHTML = `
            <label>Date (1-31)</label>
            <input type="number" id="month_date" min="1" max="31">

            <label>Time</label>
            <input type="time" id="month_time">
        `;
    }
});

initApp();

</script>

</body>
</html>
